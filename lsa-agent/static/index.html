<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes LSA + Digital Twin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 850px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #eee;
            background: white;
            padding: 0 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            background: #f8f9fa;
        }

        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fa;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.4;
            font-size: 13px;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .loading {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            40% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 14px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: transform 0.2s;
        }

        .input-area button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .emotion-select {
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 12px;
            font-size: 12px;
            cursor: pointer;
            background: white;
            color: #666;
            transition: border-color 0.3s;
        }

        .emotion-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .welcome-message {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .welcome-message h2 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .welcome-message p {
            font-size: 13px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .quick-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 12px;
        }

        .quick-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .profile-box {
            background: #f0f4ff;
            border-left: 3px solid #667eea;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.5;
        }

        .emotional-insight {
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            padding: 8px;
            margin: 6px 0;
            border-radius: 4px;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .header h1 {
                font-size: 18px;
            }

            .message-bubble {
                max-width: 90%;
                font-size: 12px;
            }

            .tab-btn {
                font-size: 12px;
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agnes AI</h1>
            <p>LSA Agent + Your Digital Twin</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('lsa')">📊 LSA Agent</button>
            <button class="tab-btn" onclick="switchTab('twin')">👤 Digital Twin</button>
        </div>

        <!-- LSA Agent Tab -->
        <div id="lsa" class="tab-content active">
            <div class="chat-area" id="lsaChatArea">
                <div class="welcome-message">
                    <h2>📊 Smart Decision Analysis</h2>
                    <p>Ask ANY decision and get relevant options for YOUR situation.</p>
                    <div class="quick-options">
                        <button class="quick-btn" onclick="sendLSAMessage('Can I skip breakfast?')">🍳 Skip breakfast?</button>
                        <button class="quick-btn" onclick="sendLSAMessage('How long should I study?')">⏱️ Study duration?</button>
                        <button class="quick-btn" onclick="sendLSAMessage('Gym: solo or with friends?')">💪 Gym: solo or friends?</button>
                        <button class="quick-btn" onclick="sendLSAMessage('What\'s the best approach for my project?')">📝 Project approach?</button>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <input 
                    type="text" 
                    id="lsaInput" 
                    placeholder="Ask any decision..." 
                    onkeypress="handleKeyPress(event, 'lsa')"
                >
                <button onclick="sendLSAMessage()" id="lsaSendBtn">Send</button>
            </div>
        </div>

        <!-- Digital Twin Tab -->
        <div id="twin" class="tab-content">
            <div class="chat-area" id="twinChatArea">
                <div class="welcome-message">
                    <h2>👤 Digital Twin</h2>
                    <p>Gets to know YOU and adviseMBased on your patterns and feelings.</p>
                    <div class="quick-options">
                        <button class="quick-btn" onclick="getTwinProfile()">📈 Show my profile</button>
                        <button class="quick-btn" onclick="sendTwinMessage('Help me decide about my workout')">💪 Workout decision</button>
                        <button class="quick-btn" onclick="sendTwinMessage('I\'m tired, what should I do?')">😴 I\'m tired</button>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="twinInput" 
                        placeholder="What's the situation..." 
                        onkeypress="handleKeyPress(event, 'twin')"
                    >
                    <select id="emotionSelect" class="emotion-select">
                        <option value="neutral">😐 Neutral</option>
                        <option value="tired">😴 Tired</option>
                        <option value="happy">😊 Happy</option>
                        <option value="stressed">😰 Stressed</option>
                        <option value="motivated">🔥 Motivated</option>
                        <option value="anxious">😟 Anxious</option>
                    </select>
                </div>
                <button onclick="sendTwinMessage()" id="twinSendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'lsa';
        let isLoadingLSA = false;
        let isLoadingTwin = false;

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
        }

        function addLSAMessage(text, isUser = false) {
            const chatArea = document.getElementById('lsaChatArea');
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = formatResponse(text);
            
            message.appendChild(bubble);
            chatArea.appendChild(message);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addTwinMessage(text, isUser = false) {
            const chatArea = document.getElementById('twinChatArea');
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = formatResponse(text);
            
            message.appendChild(bubble);
            chatArea.appendChild(message);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showLoading(type) {
            const chatArea = type === 'lsa' ? document.getElementById('lsaChatArea') : document.getElementById('twinChatArea');
            const message = document.createElement('div');
            message.className = 'message bot';
            message.id = `loading-${type}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
            
            message.appendChild(bubble);
            chatArea.appendChild(message);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading(type) {
            const loadingMsg = document.getElementById(`loading-${type}`);
            if (loadingMsg) loadingMsg.remove();
        }

        async function sendLSAMessage(preset = null) {
            const input = document.getElementById('lsaInput');
            let text = preset || input.value.trim();
            
            if (!text || isLoadingLSA) return;

            const welcome = document.getElementById('lsaChatArea').querySelector('.welcome-message');
            if (welcome) welcome.remove();

            addLSAMessage(text, true);
            if (!preset) input.value = '';
            input.focus();

            isLoadingLSA = true;
            document.getElementById('lsaSendBtn').disabled = true;
            showLoading('lsa');

            try {
                const response = await fetch('/api/lsa', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({decision: text, token: 'lsa_secure_token'})
                });

                removeLoading('lsa');

                if (!response.ok) throw new Error('Failed');
                const data = await response.json();
                const analysis = data.lsa_analysis;

                let responseText = `📊 <strong>${analysis.category.toUpperCase()}</strong><br><br>`;
                responseText += `<strong>Your Options:</strong><br><br`;

                for (let [key, scenario] of Object.entries(analysis.scenarios)) {
                    const scoreVal = Object.keys(analysis.scores).find(s => s.startsWith(key));
                    const score = scoreVal ? analysis.scores[scoreVal] : 0;
                    responseText += `${key}) ${scenario}<br><small style="color: #667eea">Score: ${score}</small><br><br>`;
                }

                responseText += `💡 <strong>${analysis.recommendation}</strong>`;

                addLSAMessage(responseText, false);

            } catch (error) {
                removeLoading('lsa');
                addLSAMessage('❌ Error processing. Try again.', false);
            } finally {
                isLoadingLSA = false;
                document.getElementById('lsaSendBtn').disabled = false;
            }
        }

        async function sendTwinMessage(preset = null) {
            const input = document.getElementById('twinInput');
            let text = preset || input.value.trim();
            const emotion = document.getElementById('emotionSelect').value;
            
            if (!text || isLoadingTwin) return;

            const welcome = document.getElementById('twinChatArea').querySelector('.welcome-message');
            if (welcome) welcome.remove();

            addTwinMessage(text, true);
            if (!preset) input.value = '';
            input.focus();

            isLoadingTwin = true;
            document.getElementById('twinSendBtn').disabled = true;
            showLoading('twin');

            try {
                const response = await fetch('/api/digital-twin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({situation: text, emotion: emotion, token: 'lsa_secure_token'})
                });

                removeLoading('twin');

                if (!response.ok) throw new Error('Failed');
                const data = await response.json();
                const analysis = data.analysis;

                let responseText = `<div class="profile-box">`;
                responseText += `<strong>About You:</strong> ${analysis.your_personality}<br><br>`;
                responseText += `<em>${analysis.your_pattern_in_this}</em>`;
                responseText += `</div>`;

                if (analysis.user_emotion && analysis.user_emotion !== 'neutral') {
                    responseText += `<div class="emotional-insight">🎭 <strong>${analysis.user_emotion.toUpperCase()}:</strong> ${analysis.rationale}</div>`;
                }

                responseText += `<div style="margin: 8px 0; font-weight: 600">${analysis.recommendation}</div>`;
                responseText += `<small>${analysis.reasoning}</small>`;

                addTwinMessage(responseText, false);

            } catch (error) {
                removeLoading('twin');
                addTwinMessage('❌ Could not analyze. Try again.', false);
            } finally {
                isLoadingTwin = false;
                document.getElementById('twinSendBtn').disabled = false;
            }
        }

        async function getTwinProfile() {
            try {
                const response = await fetch('/api/digital-twin/profile?token=lsa_secure_token');
                if (!response.ok) throw new Error('Failed');
                const data = await response.json();
                
                const welcome = document.getElementById('twinChatArea').querySelector('.welcome-message');
                if (welcome) welcome.remove();

                const profile = data.digital_twin_profile;
                let text = `<strong>📊 Your Digital Twin Profile</strong><br><br>`;
                text += `${profile.who_you_are}<br><br>`;
                text += `<small>Decisions learned: ${profile.total_decisions_learned}</small>`;

                addTwinMessage(text, false);
            } catch (error) {
                addTwinMessage('❌ Could not load profile.', false);
            }
        }

        function formatResponse(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
                .replace(/\*\//g, '');
        }

        function handleKeyPress(event, type) {
            if (event.key === 'Enter') {
                event.preventDefault();
                if (type === 'lsa') sendLSAMessage();
                else sendTwinMessage();
            }
        }

        window.addEventListener('load', () => {
            document.getElementById('lsaInput').focus();
        });
    </script>
</body>
</html>
