<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes LSA - Life Simulation Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 14px;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .loading {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .emoji {
            margin-right: 4px;
        }

        .decision-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .decision-box strong {
            color: #667eea;
        }

        .option {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin: 6px 0;
            border-left: 3px solid #667eea;
            font-size: 12px;
        }

        .recommended {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #999;
        }

        .welcome-message {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .welcome-message h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .welcome-message p {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .quick-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        .quick-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        @media (max-width: 480px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .header h1 {
                font-size: 20px;
            }

            .message-bubble {
                max-width: 90%;
            }

            .input-area {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agnes LSA</h1>
            <p>Life Simulation Agent - Ask me anything</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome-message">
                <h2>Welcome to Agnes!</h2>
                <p>I'm your personal life simulation agent. Ask me about any decision you're facing, and I'll analyze your options with intelligent scoring.</p>
                <div class="quick-options">
                    <button class="quick-btn" onclick="sendQuickMessage('Can I skip class today?')">📚 Can I skip class today?</button>
                    <button class="quick-btn" onclick="sendQuickMessage('Should I go to the gym?')">💪 Should I go to the gym?</button>
                    <button class="quick-btn" onclick="sendQuickMessage('Is it a good time to study?')">📖 Is it a good time to study?</button>
                    <button class="quick-btn" onclick="sendQuickMessage('Can I take a break today?')">🌴 Can I take a break today?</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Ask me anything..." 
                onkeypress="handleKeyPress(event)"
                autocomplete="off"
            >
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let isLoading = false;

        function addMessage(text, isUser = false) {
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = text;
            
            message.appendChild(bubble);
            chatArea.appendChild(message);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showLoading() {
            const message = document.createElement('div');
            message.className = 'message bot';
            message.id = 'loadingMessage';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
            
            message.appendChild(bubble);
            chatArea.appendChild(message);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading() {
            const loadingMsg = document.getElementById('loadingMessage');
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            
            if (!text) return;
            if (isLoading) return;

            // Clear welcome message
            const welcome = chatArea.querySelector('.welcome-message');
            if (welcome) {
                welcome.remove();
            }

            addMessage(text, true);
            messageInput.value = '';
            messageInput.focus();

            isLoading = true;
            sendBtn.disabled = true;
            showLoading();

            try {
                const response = await fetch('/webhook/whatsapp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        from: '+web-user',
                        message: text,
                        token: 'lsa_secure_token'
                    })
                });

                removeLoading();

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.response) {
                    addMessage(formatResponse(data.response), false);
                } else {
                    addMessage('Sorry, I couldn\'t process your request. Please try again.', false);
                }
            } catch (error) {
                removeLoading();
                console.error('Error:', error);
                addMessage('❌ Connection error. Please check if the server is running and try again.', false);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function formatResponse(response) {
            // Convert markdown-like formatting to HTML
            return response
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
                .replace(/A️⃣/g, '<div class="option">A️⃣')
                .replace(/B️⃣/g, '</div><div class="option">B️⃣')
                .replace(/C️⃣/g, '</div><div class="option">C️⃣')
                .replace(/RECOMMENDED/g, '<span class="recommended">RECOMMENDED</span>') + '</div>';
        }

        function sendQuickMessage(message) {
            messageInput.value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isLoading) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Focus input on load
        window.addEventListener('load', () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
